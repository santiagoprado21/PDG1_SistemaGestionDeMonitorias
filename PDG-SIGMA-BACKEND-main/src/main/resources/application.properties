#Neon database

spring.profiles.active=cloud
# Para el local, se necesita correr los scripts sql (no están en el repo)

# Jackson configuration to avoid lazy loading issues
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.open-in-view=true

# HU-014 Notificaciones (configurable)
# Habilita sistema de notificaciones
sigma.notifications.enabled=true
# Habilita alertas automáticas por atrasos
sigma.notifications.overdue-enabled=true
# Cron para job de atrasos (default 08:00 AM cada día)
sigma.notifications.overdue-cron=0 0 8 * * *
# Habilita notificaciones en tiempo real vía SSE
sigma.notifications.realtime-enabled=true

