
spring.application.name=sigma
spring.info.build.encoding=UTF-8

#Tomcat server config - Render inyecta PORT automaticamente via Dockerfile CMD
server.port=5433

# ================================================
# NEON POSTGRESQL CLOUD DATABASE
# Las credenciales se leen de variables de entorno en produccion (Render)
# ================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



# Configurar schema por defecto (usamos 'sigma' como principal)
spring.jpa.properties.hibernate.default_schema=sigma

# Configuración de Hibernate (JPA)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.show-sql=false 
spring.jpa.properties.hibernate.format_sql=false

# Email sender
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# API Banner authentication endpoint - En Render se sobreescribe con la URL del servicio Banner desplegado
sigma.banner-api.base-url=${BANNER_API_URL:http://localhost:5435}

# CORS - Orígenes permitidos (separados por coma si son varios)
# En Render, setear: CORS_ALLOWED_ORIGINS=https://tu-app.vercel.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}


