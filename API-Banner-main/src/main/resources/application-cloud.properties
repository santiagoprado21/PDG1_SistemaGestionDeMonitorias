spring.application.name=sigma
spring.info.build.encoding=UTF-8

#Tomcat server config
server.port=5431

# ================================================
# NEON POSTGRESQL CLOUD DATABASE - SCHEMA BANNER
# ================================================
# INSTRUCCIONES:
# 1. Usa las MISMAS credenciales del backend principal
# 2. Pero este API apunta al schema 'banner'
# 3. Reemplaza con TUS credenciales de Neon
# ================================================

# CONEXIÓN A NEON - MISMAS CREDENCIALES DEL BACKEND PRINCIPAL
# Nota: Para JDBC, el parámetro es channelBinding (camelCase). Añadimos channelBinding=require
# además de sslmode=require. Usamos currentSchema=banner para apuntar al esquema correcto.
spring.datasource.url=jdbc:postgresql://ep-wispy-firefly-aeueocfk-pooler.c-2.us-east-2.aws.neon.tech:5432/neondb?sslmode=require&currentSchema=banner&channelBinding=require
spring.datasource.username=TU-USUARIO-NEON
spring.datasource.password=TU-PASSWORD-NEON

# Configurar schema por defecto (este API usa 'banner')
spring.jpa.properties.hibernate.default_schema=banner

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.connection-timeout=30000

# Driver de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de Hibernate (manejo de la BD)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

